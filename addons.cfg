# Addon dependencies
# Format: name | git_url | tag_or_ref | repo_subdir | install_dir
#
# repo_subdir: path within the cloned repo to copy ("." = root)
# install_dir: where to install relative to project root (default: addons/<name>)
#
# Run ./setup.sh to install these.

